{{/*
Keycloak admin password secret.
Generates a random password on first install and preserves it across helm upgrades.
This prevents the admin password from being regenerated by the Bitnami chart on
each helm upgrade, which can cause authentication issues.
*/}}
{{- if .Values.keycloak.create }}
{{- $secretName := printf "%s-keycloak" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := "" }}
{{- if $existingSecret }}
  {{- $adminPassword = index $existingSecret.data "admin-password" | b64dec }}
{{- else }}
  {{- $adminPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "mcp-gateway-registry-stack.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password: {{ $adminPassword | b64enc | quote }}
{{- end }}
