{{/*
Shared OAuth provider secret for auth-server and registry.
Contains the auth provider type and identity provider credentials
(Keycloak, Entra, or Okta) that both services need.
*/}}
{{- if not .Values.global.existingOauthProviderSecret }}
{{- $secretName := .Values.global.oauthProviderSecretName | default "oauth-provider-secret" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $authProviderType := .Values.global.authProvider.type | default "keycloak" }}
{{- /* Resolve Keycloak URLs and realm */ -}}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default "localhost" }}
{{- $protocol := ternary "https" "http" .Values.global.ingress.tls }}
{{/*
Keycloak's browser-reachable path is pinned to /keycloak. It's
hardcoded in the registry pod's nginx config (docker/nginx_rev_proxy_*
has `location /keycloak/`, `/realms/`, `/resources/`) so changing it
here would silently mis-route traffic. If the path ever needs to
change, update the nginx config, this template, and the matching
constant in charts/auth-server/templates/secret.yaml together.
*/}}
{{- $keycloakPath := "/keycloak" }}
{{- $keycloakUrl := printf "http://%s-keycloak-headless.%s.svc.cluster.local:8080" .Release.Name .Release.Namespace }}
{{- /*
Browser-facing Keycloak URL is served through the registry pod's
in-cluster nginx proxy at /keycloak (no public Keycloak ingress by
default). The URL below is the external URL the browser sees; nginx
forwards /keycloak/* to the Keycloak ClusterIP.

In path routing mode the registry ingress exposes /keycloak as a
sibling of /registry on the shared ALB host — see
charts/registry/templates/ingress.yaml. The browser hits
<domain>/keycloak directly, not <domain>/registry/keycloak.

In subdomain routing mode there's only one hostname
(mcpregistry.<domain>) so the browser hits
mcpregistry.<domain>/keycloak.
*/ -}}
{{- /*
Keep $keycloakUrl (pod-to-pod) as bare ClusterIP:port in both routing
modes. The registry pod's in-cluster nginx handles browser-side path
rewriting (/keycloak/, /realms/, /resources/), which requires Keycloak
to serve from root (httpRelativePath: /). See
charts/registry/templates/secret.yaml for the topology note.
*/ -}}
{{- $keycloakExternalHost := "" }}
{{- if eq $routingMode "path" }}
  {{- $keycloakExternalHost = printf "%s://%s" $protocol $domain }}
{{- else }}
  {{- $keycloakExternalHost = printf "%s://mcpregistry.%s" $protocol $domain }}
{{- end }}
{{- $keycloakExternalUrl := printf "%s%s" $keycloakExternalHost $keycloakPath }}
{{- $keycloakRealm := .Values.global.authProvider.keycloak.realm | default "mcp-gateway" }}
{{- /* Resolve Keycloak M2M credentials */ -}}
{{- $keycloakM2mClientId := "" }}
{{- $keycloakM2mClientSecret := "" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "keycloak") }}
    {{- $keycloakM2mClientId = (index .Values "auth-server" "keycloak" "m2mClientId") | default "" }}
    {{- $keycloakM2mClientSecret = (index .Values "auth-server" "keycloak" "m2mClientSecret") | default "" }}
  {{- end }}
{{- end }}
{{- /* Resolve Entra credentials - prefer values, fallback to existing secret */ -}}
{{- $entraClientId := "" }}
{{- $entraClientSecret := "" }}
{{- $entraTenantId := "" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "entra") }}
    {{- $entraClientId = (index .Values "auth-server" "entra" "clientId") | default "" }}
    {{- $entraClientSecret = (index .Values "auth-server" "entra" "clientSecret") | default "" }}
    {{- $entraTenantId = (index .Values "auth-server" "entra" "tenantId") | default "" }}
  {{- end }}
{{- end }}
{{- /* Resolve Entra login base URL */ -}}
{{- $entraLoginBaseUrl := "" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "entra") }}
    {{- $entraLoginBaseUrl = (index .Values "auth-server" "entra" "loginBaseUrl") | default "" }}
  {{- end }}
{{- end }}
{{- /* Persist Entra credentials across upgrades */ -}}
{{- if and (not $entraClientId) $existingSecret }}
  {{- if index $existingSecret.data "ENTRA_CLIENT_ID" }}
    {{- $entraClientId = index $existingSecret.data "ENTRA_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $entraClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "ENTRA_CLIENT_SECRET" }}
    {{- $entraClientSecret = index $existingSecret.data "ENTRA_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $entraTenantId) $existingSecret }}
  {{- if index $existingSecret.data "ENTRA_TENANT_ID" }}
    {{- $entraTenantId = index $existingSecret.data "ENTRA_TENANT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- /* Resolve Okta credentials - prefer values, fallback to existing secret */ -}}
{{- $oktaDomain := "" }}
{{- $oktaClientId := "" }}
{{- $oktaClientSecret := "" }}
{{- $oktaM2mClientId := "" }}
{{- $oktaM2mClientSecret := "" }}
{{- $oktaApiToken := "" }}
{{- $oktaAuthServerId := "" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "okta") }}
    {{- $oktaDomain = (index .Values "auth-server" "okta" "domain") | default "" }}
    {{- $oktaClientId = (index .Values "auth-server" "okta" "clientId") | default "" }}
    {{- $oktaClientSecret = (index .Values "auth-server" "okta" "clientSecret") | default "" }}
    {{- $oktaM2mClientId = (index .Values "auth-server" "okta" "m2mClientId") | default "" }}
    {{- $oktaM2mClientSecret = (index .Values "auth-server" "okta" "m2mClientSecret") | default "" }}
    {{- $oktaApiToken = (index .Values "auth-server" "okta" "apiToken") | default "" }}
    {{- $oktaAuthServerId = (index .Values "auth-server" "okta" "authServerId") | default "" }}
  {{- end }}
{{- end }}
{{- /* Persist Okta credentials across upgrades */ -}}
{{- if and (not $oktaDomain) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_DOMAIN" }}
    {{- $oktaDomain = index $existingSecret.data "OKTA_DOMAIN" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaClientId) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_CLIENT_ID" }}
    {{- $oktaClientId = index $existingSecret.data "OKTA_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_CLIENT_SECRET" }}
    {{- $oktaClientSecret = index $existingSecret.data "OKTA_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaM2mClientId) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_M2M_CLIENT_ID" }}
    {{- $oktaM2mClientId = index $existingSecret.data "OKTA_M2M_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaM2mClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_M2M_CLIENT_SECRET" }}
    {{- $oktaM2mClientSecret = index $existingSecret.data "OKTA_M2M_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaApiToken) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_API_TOKEN" }}
    {{- $oktaApiToken = index $existingSecret.data "OKTA_API_TOKEN" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $oktaAuthServerId) $existingSecret }}
  {{- if index $existingSecret.data "OKTA_AUTH_SERVER_ID" }}
    {{- $oktaAuthServerId = index $existingSecret.data "OKTA_AUTH_SERVER_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- /* Resolve Auth0 credentials - prefer values, fallback to existing secret */ -}}
{{- $auth0Domain := "" }}
{{- $auth0ClientId := "" }}
{{- $auth0ClientSecret := "" }}
{{- $auth0Audience := "" }}
{{- $auth0GroupsClaim := "https://mcp-gateway/groups" }}
{{- $auth0M2mClientId := "" }}
{{- $auth0M2mClientSecret := "" }}
{{- $auth0ManagementApiToken := "" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "auth0") }}
    {{- $auth0Domain = (index .Values "auth-server" "auth0" "domain") | default "" }}
    {{- $auth0ClientId = (index .Values "auth-server" "auth0" "clientId") | default "" }}
    {{- $auth0ClientSecret = (index .Values "auth-server" "auth0" "clientSecret") | default "" }}
    {{- $auth0Audience = (index .Values "auth-server" "auth0" "audience") | default "" }}
    {{- $auth0GroupsClaim = (index .Values "auth-server" "auth0" "groupsClaim") | default "https://mcp-gateway/groups" }}
    {{- $auth0M2mClientId = (index .Values "auth-server" "auth0" "m2mClientId") | default "" }}
    {{- $auth0M2mClientSecret = (index .Values "auth-server" "auth0" "m2mClientSecret") | default "" }}
    {{- $auth0ManagementApiToken = (index .Values "auth-server" "auth0" "managementApiToken") | default "" }}
  {{- end }}
{{- end }}
{{- /* Persist Auth0 credentials across upgrades */ -}}
{{- if and (not $auth0Domain) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_DOMAIN" }}
    {{- $auth0Domain = index $existingSecret.data "AUTH0_DOMAIN" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0ClientId) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_CLIENT_ID" }}
    {{- $auth0ClientId = index $existingSecret.data "AUTH0_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0ClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_CLIENT_SECRET" }}
    {{- $auth0ClientSecret = index $existingSecret.data "AUTH0_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0Audience) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_AUDIENCE" }}
    {{- $auth0Audience = index $existingSecret.data "AUTH0_AUDIENCE" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0M2mClientId) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_M2M_CLIENT_ID" }}
    {{- $auth0M2mClientId = index $existingSecret.data "AUTH0_M2M_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0M2mClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_M2M_CLIENT_SECRET" }}
    {{- $auth0M2mClientSecret = index $existingSecret.data "AUTH0_M2M_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $auth0ManagementApiToken) $existingSecret }}
  {{- if index $existingSecret.data "AUTH0_MANAGEMENT_API_TOKEN" }}
    {{- $auth0ManagementApiToken = index $existingSecret.data "AUTH0_MANAGEMENT_API_TOKEN" | b64dec }}
  {{- end }}
{{- end }}
{{- /* Resolve Cognito credentials - prefer values, fallback to existing secret */ -}}
{{- $cognitoUserPoolId := "" }}
{{- $cognitoClientId := "" }}
{{- $cognitoClientSecret := "" }}
{{- $cognitoDomain := "" }}
{{- $cognitoRegion := "us-east-1" }}
{{- if (index .Values "auth-server") }}
  {{- if (index .Values "auth-server" "cognito") }}
    {{- $cognitoUserPoolId = (index .Values "auth-server" "cognito" "userPoolId") | default "" }}
    {{- $cognitoClientId = (index .Values "auth-server" "cognito" "clientId") | default "" }}
    {{- $cognitoClientSecret = (index .Values "auth-server" "cognito" "clientSecret") | default "" }}
    {{- $cognitoDomain = (index .Values "auth-server" "cognito" "domain") | default "" }}
    {{- $cognitoRegion = (index .Values "auth-server" "cognito" "region") | default "us-east-1" }}
  {{- end }}
{{- end }}
{{- /* Persist Cognito credentials across upgrades */ -}}
{{- if and (not $cognitoUserPoolId) $existingSecret }}
  {{- if index $existingSecret.data "COGNITO_USER_POOL_ID" }}
    {{- $cognitoUserPoolId = index $existingSecret.data "COGNITO_USER_POOL_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $cognitoClientId) $existingSecret }}
  {{- if index $existingSecret.data "COGNITO_CLIENT_ID" }}
    {{- $cognitoClientId = index $existingSecret.data "COGNITO_CLIENT_ID" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $cognitoClientSecret) $existingSecret }}
  {{- if index $existingSecret.data "COGNITO_CLIENT_SECRET" }}
    {{- $cognitoClientSecret = index $existingSecret.data "COGNITO_CLIENT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "mcp-gateway-registry-stack.labels" . | nindent 4 }}
type: Opaque
data:
  AUTH_PROVIDER: {{ $authProviderType | b64enc | quote }}
  {{- if eq $authProviderType "keycloak" }}
  KEYCLOAK_ENABLED: {{ "true" | b64enc | quote }}
  KEYCLOAK_URL: {{ $keycloakUrl | b64enc | quote }}
  KEYCLOAK_EXTERNAL_URL: {{ $keycloakExternalUrl | b64enc | quote }}
  KEYCLOAK_REALM: {{ $keycloakRealm | b64enc | quote }}
  {{- if $keycloakM2mClientId }}
  KEYCLOAK_M2M_CLIENT_ID: {{ $keycloakM2mClientId | b64enc | quote }}
  {{- end }}
  {{- if $keycloakM2mClientSecret }}
  KEYCLOAK_M2M_CLIENT_SECRET: {{ $keycloakM2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- else if eq $authProviderType "entra" }}
  ENTRA_ENABLED: {{ "true" | b64enc | quote }}
  ENTRA_CLIENT_ID: {{ $entraClientId | b64enc | quote }}
  ENTRA_CLIENT_SECRET: {{ $entraClientSecret | b64enc | quote }}
  ENTRA_TENANT_ID: {{ $entraTenantId | b64enc | quote }}
  {{- if $entraLoginBaseUrl }}
  ENTRA_LOGIN_BASE_URL: {{ $entraLoginBaseUrl | b64enc | quote }}
  {{- end }}
  {{- else if eq $authProviderType "okta" }}
  OKTA_ENABLED: {{ "true" | b64enc | quote }}
  OKTA_DOMAIN: {{ $oktaDomain | b64enc | quote }}
  OKTA_CLIENT_ID: {{ $oktaClientId | b64enc | quote }}
  OKTA_CLIENT_SECRET: {{ $oktaClientSecret | b64enc | quote }}
  {{- if $oktaM2mClientId }}
  OKTA_M2M_CLIENT_ID: {{ $oktaM2mClientId | b64enc | quote }}
  {{- end }}
  {{- if $oktaM2mClientSecret }}
  OKTA_M2M_CLIENT_SECRET: {{ $oktaM2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if $oktaApiToken }}
  OKTA_API_TOKEN: {{ $oktaApiToken | b64enc | quote }}
  {{- end }}
  {{- if $oktaAuthServerId }}
  OKTA_AUTH_SERVER_ID: {{ $oktaAuthServerId | b64enc | quote }}
  {{- end }}
  {{- else if eq $authProviderType "auth0" }}
  AUTH0_ENABLED: {{ "true" | b64enc | quote }}
  AUTH0_DOMAIN: {{ $auth0Domain | b64enc | quote }}
  AUTH0_CLIENT_ID: {{ $auth0ClientId | b64enc | quote }}
  AUTH0_CLIENT_SECRET: {{ $auth0ClientSecret | b64enc | quote }}
  {{- if $auth0Audience }}
  AUTH0_AUDIENCE: {{ $auth0Audience | b64enc | quote }}
  {{- end }}
  AUTH0_GROUPS_CLAIM: {{ $auth0GroupsClaim | b64enc | quote }}
  {{- if $auth0M2mClientId }}
  AUTH0_M2M_CLIENT_ID: {{ $auth0M2mClientId | b64enc | quote }}
  {{- end }}
  {{- if $auth0M2mClientSecret }}
  AUTH0_M2M_CLIENT_SECRET: {{ $auth0M2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if $auth0ManagementApiToken }}
  AUTH0_MANAGEMENT_API_TOKEN: {{ $auth0ManagementApiToken | b64enc | quote }}
  {{- end }}
  {{- else if eq $authProviderType "cognito" }}
  COGNITO_ENABLED: {{ "true" | b64enc | quote }}
  COGNITO_USER_POOL_ID: {{ $cognitoUserPoolId | b64enc | quote }}
  COGNITO_CLIENT_ID: {{ $cognitoClientId | b64enc | quote }}
  COGNITO_CLIENT_SECRET: {{ $cognitoClientSecret | b64enc | quote }}
  {{- if $cognitoDomain }}
  COGNITO_DOMAIN: {{ $cognitoDomain | b64enc | quote }}
  {{- end }}
  {{- if $cognitoRegion }}
  AWS_REGION: {{ $cognitoRegion | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
