{{/*
Keycloak PostgreSQL secret.
Generates random passwords on first install and preserves them across helm upgrades.
This prevents the bn_keycloak authentication failure that occurs when Bitnami's
PostgreSQL subchart regenerates passwords but the PVC retains the original ones.
*/}}
{{- if .Values.keycloak.create }}
{{- $secretName := printf "%s-keycloak-postgresql" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- $postgresPassword := "" }}
{{- if $existingSecret }}
  {{- $password = index $existingSecret.data "password" | b64dec }}
  {{- $postgresPassword = index $existingSecret.data "postgres-password" | b64dec }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
  {{- $postgresPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "mcp-gateway-registry-stack.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
  postgres-password: {{ $postgresPassword | b64enc | quote }}
{{- end }}
