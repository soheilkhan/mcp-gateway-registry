# Global configuration - these values are passed to all subcharts
global:
  # Image tag for all services (auth-server, registry, mcpgw)
  # This value is passed down to all subcharts via Helm's global scope
  image:
    tag: 1.0.18

  # When installing chart from repository, add --set global.chartVersion=$(git rev-parse HEAD) to add the git hash to a configmap for debugging
  chartVersion:

  # Domain configuration - update this to your actual domain
  domain: "DOMAIN"

  # Security settings
  # secretKey: If not provided, a random 64-character key is auto-generated
  # and shared between auth-server and registry via a shared secret.
  # The generated key persists across helm upgrades.
  # Uncomment and set to use a specific key:
  # secretKey: "your-secure-key-here"

  # Shared secret name - automatically set for stack deployment
  # Both auth-server and registry will use this secret for SECRET_KEY and federation (if enabled)
  sharedSecretName: "shared-secret"

  # OAuth provider shared secret - contains auth provider type and IdP credentials
  # Both auth-server and registry reference this secret for Keycloak/Entra configuration
  oauthProviderSecretName: "oauth-provider-secret"

  # Existing secret references - set these to use pre-existing secrets instead of chart-managed ones.
  # When set, the chart skips creating the corresponding managed Secret resource.
  # The existing secret must contain the same keys the chart would have created.
  existingSharedSecret: ""          # If set, skip creating shared-secret and use this name instead
  existingOauthProviderSecret: ""   # If set, skip creating oauth-provider-secret and use this name instead
  existingMongoCredentialsSecret: "" # If set, use this name instead of mongo-credentials in deployments

  # Federation configuration - shared between registry and auth-server
  federation:
    staticTokenAuthEnabled: false # If not provided, defaults to false
    staticToken: # If not provided, a random token is auto-generated
    encryptionKey: # If not provided, a Fernet key is auto-generated
    registryId: # Unique identifier for this registry instance (optional)

  # Authentication Provider Configuration
  # Choose ONE provider: keycloak, entra, okta, auth0, or cognito
  authProvider:
    # Provider type: "keycloak", "entra", "okta", "auth0", or "cognito"
    type: keycloak
    keycloak:
      adminUsername: &keycloakAdmin "user"
      realm: &keycloakRealm "mcp-gateway"
      # Don't set password here - let Keycloak chart generate it
    entra:
      adminGroupId: # UUID of Entra admin group

  # Common ingress settings
  ingress:
    inboundCidrs: # optional comma separated list of allowed inbound CIDR ranges
    className: alb
    tls: true
    # Routing mode: "subdomain" or "path"
    # - subdomain: auth-server.domain.com, mcpregistry.domain.com, keycloak.domain.com
    # - path: domain.com/auth-server, domain.com/registry, domain.com/keycloak
    routingMode: subdomain
    # Path configuration (only used when routingMode: path)
    paths:
      authServer: /auth-server
      registry: /registry
      mcpgw: /mcpgw
      keycloak: /keycloak # make sure to update keycloak.httpRelativePath (/keycloak/)

mongodb-kubernetes:
  operator:
    enableClusterMongoDBRoles: false
    telemetry:
      installClusterRole: false
    nodeSelector: {}

# MongoDB configuration
mongodb:
  enabled: true
  user: &mongoUser my-user # username for MongoDB
  password: &mongoPassword CHANGEME # Set the password for the MongoDB user
  database: &mongoDatabase mcp_registry
  existingPasswordSecret: "" # If set, skip creating my-user-password secret and use this name instead

# Keycloak configuration
# Set create: true to deploy Keycloak as part of this stack
# Set create: false to use an external Keycloak instance
# NOTE: When using Entra (global.authProvider.type: entra), set create: false
keycloak:
  create: true  # Deploy Keycloak in this stack (set to false for external Keycloak or Entra)
  image:
    registry: public.ecr.aws

  global:
    security:
      allowInsecureImages: true

  auth:
    adminUser: *keycloakAdmin
    existingSecret: '{{ .Release.Name }}-keycloak'

  postgresql:
    auth:
      existingSecret: '{{ .Release.Name }}-keycloak-postgresql'
    image:
      registry: public.ecr.aws

  # HTTP relative path for path-based routing
  # IMPORTANT: This must match global.ingress.paths.keycloak when routingMode is "path"
  # For subdomain routing, set to "/"
  # IMPORTANT: This must have a trailing "/"
  httpRelativePath: /

  extraEnvVars:
    - name: KC_PROXY
      value: edge
    - name: KC_PROXY_HEADERS
      value: xforwarded

  ingress:
    enabled: false  # We use a custom ingress template that supports global.domain

  nodeSelector: {}

  # Lifecycle hook to configure realm SSL settings
  lifecycleHooks:
    postStart:
      exec:
        command:
          - "/bin/bash"
          - "-c"
          - |
            (
              echo "PostStart: Waiting for Keycloak to be ready..."
              # Determine the base path - check if KC_HTTP_RELATIVE_PATH is set
              BASE_PATH="${KC_HTTP_RELATIVE_PATH:-}"
              BASE_URL="http://localhost:8080${BASE_PATH}"
              echo "Using base URL: $BASE_URL"
              for i in {1..120}; do
                if curl -sf ${BASE_URL}/realms/$KC_SPI_ADMIN_REALM > /dev/null 2>&1; then
                  echo "Keycloak ready after $i attempts"
                  break
                fi
                sleep 5
              done
              sleep 10
              echo "Configuring $KC_SPI_ADMIN_REALM realm..."
              /opt/bitnami/keycloak/bin/kcadm.sh config credentials \
                --config /tmp/kcadm.config \
                --server ${BASE_URL} \
                --realm $KC_SPI_ADMIN_REALM \
                --user $KC_BOOTSTRAP_ADMIN_USERNAME \
                --password $(cat $KC_BOOTSTRAP_ADMIN_PASSWORD_FILE)
              /opt/bitnami/keycloak/bin/kcadm.sh update \
                --config /tmp/kcadm.config \
                realms/$KC_SPI_ADMIN_REALM \
                -s sslRequired=NONE
              echo "✓ $KC_SPI_ADMIN_REALM realm configured!"
            ) > /tmp/poststart-config.log 2>&1 &

# Keycloak configuration job
# Automatically enabled when global.authProvider.type = "keycloak"
# Set to false to skip configuration (e.g., when using pre-configured Keycloak)
# NOTE: When using Entra (global.authProvider.type: entra), set enabled: false
keycloak-configure:
  enabled: true  # Set to false to skip Keycloak configuration or when using Entra
  keycloak:
    realm: *keycloakRealm
    adminUser: *keycloakAdmin
  # authServer.externalUrl will be templated in the subchart using global.domain

# Keycloak ingress for mcp-gateway-registry
# Whether to create an ingress for Keycloak with this Chart (only applicable when keycloak.create: true)
keycloakIngress:
  enabled: true

# Mongodb configuration job
mongodb-configure:
  enabled: true # Whether to run the MongoDB configuration job
  mongodb:
    username: *mongoUser
    password: *mongoPassword
    database: *mongoDatabase

# Registry service configuration
registry:
  app:
    replicas: 2 # set to > 1 replica for high availability
    # Deployment mode: with-gateway (nginx integration) or registry-only (catalog only)
    deploymentMode: with-gateway

    # Registry mode: full, skills-only, mcp-servers-only, agents-only
    registryMode: full

    # Tab visibility overrides (AND-ed with registryMode)
    showServersTab: true
    showVirtualServersTab: true
    showSkillsTab: true
    showAgentsTab: true

    # Federation OAuth2 authentication (alternative to static token)
    federationTokenEndpoint: ""
    federationClientId: ""
    federationClientSecret: ""

    # ASOR (Workday) federation integration
    asorAccessToken: ""
    workdayTokenUrl: ""

    # Skill security scanning configuration
    skillSecurityScanEnabled: true  # Enable/disable skill security scanning
    skillSecurityAnalyzers: "static"  # Comma-separated: static, behavioral, llm, meta, virustotal, ai-defense

    # OpenTelemetry direct OTLP push export configuration
    otelOtlpEndpoint: ""  # OTLP endpoint URL (e.g., https://otlp.datadoghq.com)
    otelExporterOtlpHeaders: ""  # OTLP headers (e.g., dd-api-key=YOUR_KEY)
    otelOtlpExportIntervalMs: "30000"  # Export interval in milliseconds
    otelExporterOtlpMetricsTemporalityPreference: "cumulative"  # cumulative or delta

    # Telemetry configuration
    # Anonymous usage telemetry (startup ping + daily heartbeat, both on by default)
    mcpTelemetryDisabled: false  # Set to true to disable all telemetry
    mcpTelemetryOptOut: false  # Set to true to disable daily heartbeat only (startup ping still sent)
    telemetryHeartbeatIntervalMinutes: "1440"  # Heartbeat interval in minutes (default: 1440 = 24 hours)
    telemetryDebug: false  # Set to true to log payloads instead of sending

    # Demo server configuration
    disableAiRegistryToolsServer: false  # Set to true to disable auto-registration of the built-in airegistry-tools server

  # AWS Agent Registry Federation
  awsRegistry:
    federationEnabled: false  # Enable AWS Agent Registry federation (overrides MongoDB config on startup)

  # ANS (Agent Name Service) Integration
  ans:
    enabled: false  # Enable ANS integration for trust verification
    apiEndpoint: "https://api.godaddy.com"  # ANS API base URL
    apiKey: ""  # GoDaddy API key (required when enabled)
    apiSecret: ""  # GoDaddy API secret (required when enabled)
    apiTimeoutSeconds: "30"  # HTTP request timeout for ANS API calls
    syncIntervalHours: "6"  # Background re-verification interval
    verificationCacheTtlSeconds: "3600"  # Cache TTL for verification results

  # Registry Card Configuration (for federation and discovery)
  registryCard:
    url: ""  # External URL of the registry (defaults to computed ingress URL)
    name: "AI Registry"  # Human-readable name
    organizationName: ""  # Organization operating the registry
    description: ""  # Optional description
    contactEmail: ""  # Optional contact email
    contactUrl: ""  # Optional contact URL/website

  # IdP group filtering (applies to all identity providers)
  # When set, only groups whose name starts with any of these prefixes are shown in IAM > Groups
  # Example: "mcp-,registry-,ai-"
  idpGroupFilterPrefix: ""

  ingress:
    enabled: true
    ingressClassName: alb

  nodeSelector: {}

# MCPGW MCP server configuration
mcpgw:
  enabled: true # Set to true to deploy the MCPGW MCP server
  app:
    replicas: 1

    # Embeddings configuration
    embeddingsProvider: sentence-transformers
    embeddingsModelName: all-MiniLM-L6-v2
    embeddingsModelDimensions: "384"

  ingress:
    enabled: true
    ingressClassName: alb

  nodeSelector: {}

# Auth server configuration
auth-server:
  app:
    replicas: 2 # set to > 1 replica for high availability
    oauthStoreTokensInSession: false  # Store OAuth tokens in session (default: false)
    # Internal JWT configuration
    jwtIssuer: "mcp-auth-server"  # Issuer claim for internal JWT tokens
    jwtAudience: "mcp-registry"  # Audience claim for internal JWT tokens
    # Static token authentication (alternative to IdP JWT for Registry API)
    registryStaticTokenAuthEnabled: false
    registryApiToken: ""
    # Rate limiting
    maxTokensPerUserPerHour: "100"

  keycloak:
    enabled: true
    realm: *keycloakRealm
    m2mClientId: ""  # Optional: M2M client ID
    m2mClientSecret: ""  # Optional: M2M client secret
    # externalUrl will be templated in the subchart using global.domain

  # Entra ID settings (used when global.authProvider.type = "entra")
  entra:
    clientId: ""
    clientSecret: ""
    tenantId: ""
    loginBaseUrl: ""  # Custom Entra login base URL for sovereign clouds

  # Okta settings (used when global.authProvider.type = "okta")
  okta:
    domain: ""  # e.g., dev-123456.okta.com
    clientId: ""
    clientSecret: ""
    m2mClientId: ""  # Optional: defaults to clientId
    m2mClientSecret: ""  # Optional: defaults to clientSecret
    apiToken: ""  # Optional: required for IAM operations
    authServerId: ""  # Optional: uses default Org Authorization Server if not set

  # Auth0 settings (used when global.authProvider.type = "auth0")
  auth0:
    domain: ""  # e.g., your-tenant.us.auth0.com
    clientId: ""
    clientSecret: ""
    audience: ""  # Optional: API audience for M2M tokens
    groupsClaim: "https://mcp-gateway/groups"
    m2mClientId: ""
    m2mClientSecret: ""
    managementApiToken: ""  # Optional: alternative to M2M credentials (expires after 24h)

  # Cognito settings (used when global.authProvider.type = "cognito")
  cognito:
    userPoolId: ""
    clientId: ""
    clientSecret: ""
    domain: ""  # Optional: custom Cognito domain
    region: "us-east-1"

  ingress:
    enabled: true
    ingressClassName: alb

  nodeSelector: {}
