---
global:
  accountId: 636347950933
  clusterKey: local
  region: us-east-1
  regionCode: use1
  businessUnit: zmp
  environment: &env development
  tags:
    CostCenter: dev
    Environment: *env
    Feature: assistants
    FeatureType: mcp-gateway-registry
    Team: gen-ai


registry:
  replicaCount: 1

  service:
    healthCheck: /health
    port: 8080

  image:
    repository: zeta-aiml/gen-ai/ai-assistants/mcp-gateway-registry/images/mcp-gateway-registry
    internal: true
    pullPolicy: IfNotPresent
    tag: latest # replace with CI_COMMIT_SHORT_SHA from dev image build

  ingress:
    enabled: true
    className: alb
    scheme: internet-facing

  autoscaling:
    enabled: false

  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

  config:
    autoReload: true
    envs:
      REGISTRY_MODE: full
      DEPLOYMENT_MODE: with-gateway
      STORAGE_BACKEND: file
      BIND_HOST: "0.0.0.0"
      AUTH_PROVIDER: none
      DOCUMENTDB_USE_TLS: "false"
      DOCUMENTDB_HOST: "none"
    volumeMounts:
      - name: registry-data
        path: /data
        sizeLimit: 5Gi

  serviceMonitor:
    enabled: true

  serviceAccount:
    create: true
    name: registry

  karpenter:
    nodeClass:
      ami: bottlerocket@latest
      ephemeralStorage: 5Gi
    nodePool:
      instance:
        generation:
          operator: Gt
          values:
            - "6"

auth-server:
  replicaCount: 1

  service:
    healthCheck: /health
    port: 8888

  image:
    repository: zeta-aiml/gen-ai/ai-assistants/mcp-gateway-registry/images/mcp-gateway-auth-server
    internal: true
    pullPolicy: IfNotPresent
    tag: latest # replace with CI_COMMIT_SHORT_SHA from dev image build

  ingress:
    enabled: false

  autoscaling:
    enabled: false

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

  config:
    autoReload: true
    envs:
      BIND_HOST: "0.0.0.0"

  serviceAccount:
    create: true
    name: auth-server

  karpenter:
    nodeClass:
      ami: bottlerocket@latest
    nodePool:
      instance:
        generation:
          operator: Gt
          values:
            - "6"

mcpgw:
  replicaCount: 1

  service:
    healthCheck: ""
    port: 8003

  image:
    repository: zeta-aiml/gen-ai/ai-assistants/mcp-gateway-registry/images/mcp-gateway-mcpgw
    internal: true
    pullPolicy: IfNotPresent
    tag: latest # replace with CI_COMMIT_SHORT_SHA from dev image build

  ingress:
    enabled: false

  autoscaling:
    enabled: false

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

  probes:
    liveness:
      httpGet: null
      tcpSocket:
        port: http
      periodSeconds: 60
      timeoutSeconds: 10
    readiness:
      httpGet: null
      tcpSocket:
        port: http
      periodSeconds: 30
      timeoutSeconds: 10

  config:
    autoReload: true
    envs:
      PORT: "8003"
      HOST: "0.0.0.0"

  serviceAccount:
    create: true
    name: mcpgw

  karpenter:
    nodeClass:
      ami: bottlerocket@latest
    nodePool:
      instance:
        generation:
          operator: Gt
          values:
            - "6"
