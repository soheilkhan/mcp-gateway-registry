apiVersion: v1
kind: ConfigMap
metadata:
  name: register-mcpgw
  namespace: {{ .Release.Namespace | quote }}
data:
  register.py: |
    """Register the MCPGW MCP server in the registry."""

    import logging
    import os
    import sys
    import time

    import jwt as pyjwt
    import requests

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s,p%(process)s,{%(filename)s:%(lineno)d},%(levelname)s,%(message)s",
    )
    logger = logging.getLogger(__name__)

    # JWT constants (must match registry/auth/internal.py)
    _INTERNAL_JWT_ISSUER = "mcp-auth-server"
    _INTERNAL_JWT_AUDIENCE = "mcp-registry"
    _INTERNAL_JWT_TTL_SECONDS = 60

    MAX_RETRIES = 60
    RETRY_DELAY_SECONDS = 10


    def _generate_internal_token() -> str:
        """Generate a short-lived JWT for internal service auth."""
        secret_key = os.environ.get("SECRET_KEY")
        if not secret_key:
            raise ValueError("SECRET_KEY environment variable not set")

        now = int(time.time())
        claims = {
            "iss": _INTERNAL_JWT_ISSUER,
            "aud": _INTERNAL_JWT_AUDIENCE,
            "sub": "mcpgw-configure-job",
            "purpose": "register-mcpgw",
            "token_use": "access",
            "iat": now,
            "exp": now + _INTERNAL_JWT_TTL_SECONDS,
        }
        return pyjwt.encode(claims, secret_key, algorithm="HS256")


    def _wait_for_registry(registry_url: str) -> None:
        """Wait for the registry to be ready."""
        health_url = f"{registry_url}/health"
        for attempt in range(1, MAX_RETRIES + 1):
            try:
                response = requests.get(health_url, timeout=5)
                if response.status_code == 200:
                    logger.info(f"Registry is ready (attempt {attempt})")
                    return
                logger.info(f"Registry returned {response.status_code}, retrying...")
            except requests.ConnectionError:
                logger.info(f"Registry not reachable (attempt {attempt}/{MAX_RETRIES}), retrying...")
            except Exception as e:
                logger.warning(f"Health check error: {e}")
            time.sleep(RETRY_DELAY_SECONDS)
        raise RuntimeError(f"Registry not ready after {MAX_RETRIES} attempts")


    def _register_mcpgw(registry_url: str) -> None:
        """Register the MCPGW server in the registry."""
        token = _generate_internal_token()
        headers = {"Authorization": f"Bearer {token}"}

        form_data = {
            "name": os.environ["MCPGW_SERVER_NAME"],
            "description": os.environ["MCPGW_DESCRIPTION"],
            "path": os.environ["MCPGW_PATH"],
            "proxy_pass_url": os.environ["MCPGW_PROXY_PASS_URL"],
            "supported_transports": os.environ.get("MCPGW_SUPPORTED_TRANSPORTS", '["streamable-http"]'),
            "auth_scheme": os.environ.get("MCPGW_AUTH_SCHEME", "none"),
            "tags": os.environ.get("MCPGW_TAGS", ""),
            "overwrite": "true",
        }

        logger.info(f"Registering MCPGW server at {registry_url}/api/internal/register")
        logger.info(f"  name: {form_data['name']}")
        logger.info(f"  path: {form_data['path']}")
        logger.info(f"  proxy_pass_url: {form_data['proxy_pass_url']}")

        response = requests.post(
            f"{registry_url}/api/internal/register",
            data=form_data,
            headers=headers,
            timeout=30,
        )

        if response.status_code in (200, 201):
            logger.info(f"MCPGW server registered successfully: {response.json()}")
        else:
            logger.error(f"Registration failed: {response.status_code} - {response.text}")
            response.raise_for_status()


    def main() -> None:
        registry_url = os.environ.get("REGISTRY_URL", "http://registry:8000")

        logger.info("Starting MCPGW registration job")
        logger.info(f"Registry URL: {registry_url}")

        _wait_for_registry(registry_url)
        _register_mcpgw(registry_url)

        logger.info("MCPGW registration job completed successfully")


    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            logger.error(f"MCPGW registration failed: {e}")
            sys.exit(1)
