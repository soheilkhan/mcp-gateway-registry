apiVersion: batch/v1
kind: Job
metadata:
  name: setup-keycloak
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    # Re-run on every install and upgrade so the realm's client redirect
    # URIs stay in sync with the computed AUTH_SERVER_EXTERNAL_URL /
    # REGISTRY_URL. Without this, Jobs are immutable and a chart upgrade
    # that changes those URLs would leave the realm pointing at the old
    # addresses until an operator manually deleted and recreated the Job.
    "helm.sh/hook": "post-install,post-upgrade"
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  template:
    spec:
      containers:
        - name: job
          image: public.ecr.aws/docker/library/python:3.13-slim
          command: ["/bin/bash", "/app/script.sh"]
          envFrom:
            - secretRef:
                name: {{ .Values.keycloak.existingSecret | default "keycloak-configure-secret" }}
          env:
            - valueFrom:
                secretKeyRef:
                  key: admin-password
                  name: {{ .Release.Name}}-keycloak
              name: KEYCLOAK_ADMIN_PASSWORD
          volumeMounts:
            - mountPath: /app/script.sh
              name: script
              subPath: script.sh
      restartPolicy: Never
      volumes:
        - name: script
          configMap:
            name: setup-keycloak
      serviceAccountName: keycloak-configure-sa
  backoffLimit: 4
