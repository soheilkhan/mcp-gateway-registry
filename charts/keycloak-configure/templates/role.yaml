apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-read-write
  namespace: {{ .Release.Namespace | quote }}
rules:
  - apiGroups: [""] # "" indicates the core API group
    resources: ["secrets"]
    # `update` and `patch` are required because the Job is a
    # post-install + post-upgrade Helm hook and uses
    # `kubectl create ... --dry-run=client -o yaml | kubectl apply -f -`
    # to idempotently write keycloak-client-secret and
    # registry-login-credentials. Plain `create` would 403 on upgrade
    # when those Secrets already exist.
    verbs: ["get", "watch", "list", "create", "update", "patch"]

