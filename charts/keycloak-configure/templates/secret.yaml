{{- if not .Values.keycloak.existingSecret }}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default "localhost" }}
{{- $protocol := ternary "https" "http" .Values.global.ingress.tls }}
{{- $registryPath := .Values.global.ingress.paths.registry | default "/registry" }}
{{- $keycloakUrl := printf "http://%s-keycloak-headless.%s.svc.cluster.local:8080" .Release.Name .Release.Namespace }}
{{- $authServerExternalUrl := "" }}
{{- $registryUrl := "" }}
{{- /*
Topology note:

  - In subdomain routing mode, the registry ingress is on
    mcpregistry.<domain>, and auth-server's /oauth2/* routes are
    proxied through it by the registry pod's in-cluster nginx. So the
    browser redirect URI is mcpregistry.<domain>/oauth2/callback/...
    and $authServerHost == $registryUrl.

  - In path routing mode, the registry ingress exposes /registry AND
    sibling /oauth2 on the same shared ALB host — see
    charts/registry/templates/ingress.yaml. The browser hits
    <domain>/oauth2/callback/..., not <domain>/registry/oauth2/... .
    So $authServerHost is the bare host, while $registryUrl (used for
    the Keycloak client's primary URL) includes /registry.
*/ -}}
{{- /*
Keep $keycloakUrl (pod-to-pod admin API) as the bare ClusterIP:port in
both routing modes — Keycloak serves from root (httpRelativePath: /).
The registry pod's nginx handles browser-side path rewriting; this Job
talks to Keycloak directly over the cluster network.
*/ -}}
{{- $authServerHost := "" }}
{{- if eq $routingMode "path" }}
  {{- $registryUrl = printf "%s://%s%s" $protocol $domain $registryPath }}
  {{- $authServerHost = printf "%s://%s" $protocol $domain }}
{{- else }}
  {{- $registryUrl = printf "%s://mcpregistry.%s" $protocol $domain }}
  {{- $authServerHost = $registryUrl }}
{{- end }}
{{- $authServerExternalUrl = $authServerHost }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-configure-secret
  namespace: {{ .Release.Namespace | quote }}
data:
  KEYCLOAK_ADMIN: {{ .Values.keycloak.adminUser | b64enc | quote }}
  KEYCLOAK_ADMIN_URL: {{ $keycloakUrl | b64enc | quote }}
  KEYCLOAK_URL: {{ $keycloakUrl | b64enc | quote }}
  REALM: {{ .Values.keycloak.realm | b64enc | quote }}
  AUTH_SERVER_EXTERNAL_URL: {{ $authServerExternalUrl | b64enc | quote }}
  REGISTRY_URL: {{ $registryUrl | b64enc | quote }}
{{- end }}
