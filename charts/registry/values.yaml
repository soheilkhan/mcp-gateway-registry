# Global configuration
global:
  image:
    # Container registry (host + optional namespace). Shared default across subcharts.
    registry: public.ecr.aws/p3v1o3c6
    tag: 1.23.0
    pullPolicy: IfNotPresent

# Per-service image configuration
# Any field left empty falls back to the corresponding global.image.* value.
image:
  registry: ""      # Overrides global.image.registry when set
  repository: registry  # Image name within the registry
  tag: 1.23.0
  pullPolicy: ""    # Overrides global.image.pullPolicy when set

# Application configuration
app:
  name: registry
  replicas: 1
  envSecretName: registry-secret
  existingSecret: ""  # If set, use this existing secret instead of creating one

  # Security settings
  # secretKey: If not provided, a random 64-character key is auto-generated.
  # When deployed via mcp-gateway-registry-stack, the key is shared with auth-server.
  # Uncomment to use a specific key:
  # secretKey: "your-secure-key-here"

  # Session cookie Domain attribute. Leave empty to default to
  # ".<global.domain>". See charts/auth-server/values.yaml for a longer
  # note on when to override.
  sessionCookieDomain: ""

  # Federation configuration
  federationStaticTokenAuthEnabled: false #If not provided, defaults to false
  federationStaticToken: # If not provided, a random token is auto-generated
  federationEncryptionKey: # If not provided, a Fernet key is auto-generated
  registryId: # Unique identifier for this registry instance (optional)
  # Federation OAuth2 authentication (alternative to static token for outbound peer connections)
  federationTokenEndpoint: ""  # OAuth2 token endpoint for federation authentication
  federationClientId: ""  # OAuth2 client ID for federation
  federationClientSecret: ""  # OAuth2 client secret for federation

  # ASOR (Workday) integration (independent of peer federation)
  asorAccessToken: ""  # Pre-obtained access token for ASOR federation
  workdayTokenUrl: ""  # Workday OAuth2 token endpoint URL

  # Skill security scanning configuration
  skillSecurityScanEnabled: true  # Enable/disable skill security scanning
  skillSecurityAnalyzers: "static"  # Comma-separated: static, behavioral, llm, meta, virustotal, ai-defense

  # Static API keys for registry path authentication (JSON string)
  # Configures multiple static API keys that fall through to JWT validation when unmatched
  registryApiKeys: ""
  registryApiKeysExistingSecret: ""  # If set, read REGISTRY_API_KEYS from this K8s secret instead
  registryApiKeysExistingSecretKey: "REGISTRY_API_KEYS"  # Key within the existing secret

  # Registration webhook (issue #742)
  # Fire an async POST when a server, agent, or skill is registered or deleted.
  registrationWebhookUrl: ""  # Webhook URL. Disabled when empty.
  registrationWebhookAuthHeader: "Authorization"  # If "Authorization", Bearer is auto-prepended.
  registrationWebhookAuthToken: ""  # Auth token. Leave empty for unauthenticated webhooks.
  registrationWebhookTimeoutSeconds: "10"

  # Registration gate / admission control (issue #809)
  # Calls an external endpoint to approve or deny registrations and updates
  # BEFORE they are persisted. Fail-closed when gate is unreachable.
  registrationGateEnabled: false
  registrationGateUrl: ""  # Gate URL. Must be set when enabled.
  registrationGateAuthType: "none"  # none, api_key, or bearer
  registrationGateAuthCredential: ""  # Credential for api_key or bearer
  registrationGateAuthHeaderName: "X-Api-Key"  # Header for api_key auth
  registrationGateTimeoutSeconds: "5"
  registrationGateMaxRetries: "2"
  registrationGateOauth2TokenUrl: ""  # OAuth2 token endpoint for client credentials flow
  registrationGateOauth2ClientId: ""  # OAuth2 client ID
  registrationGateOauth2ClientSecret: ""  # OAuth2 client secret
  registrationGateOauth2Scope: ""  # OAuth2 scope (e.g., api://app-id/.default for Entra)

  # M2M direct client registration (issue #851)
  # Exposes /api/iam/m2m-clients admin API for registering M2M client_ids and
  # their group mappings directly, without requiring an IdP Admin API token.
  m2mDirectRegistrationEnabled: true

  # OpenTelemetry direct OTLP push export configuration
  otelOtlpEndpoint: ""  # OTLP endpoint URL (e.g., https://otlp.datadoghq.com)
  otelExporterOtlpHeaders: ""  # OTLP headers (e.g., dd-api-key=YOUR_KEY)
  otelOtlpExportIntervalMs: "30000"  # Export interval in milliseconds
  otelExporterOtlpMetricsTemporalityPreference: "cumulative"  # cumulative or delta

  # Telemetry configuration
  # Anonymous usage telemetry (startup ping + daily heartbeat, both on by default)
  mcpTelemetryDisabled: false  # Set to true to disable all telemetry
  mcpTelemetryOptOut: false  # Set to true to disable daily heartbeat only (startup ping still sent)
  telemetryHeartbeatIntervalMinutes: "1440"  # Heartbeat interval in minutes (default: 1440 = 24 hours)
  telemetryDebug: false  # Set to true to log payloads instead of sending
  mcpTelemetryImdsProbeDisabled: false  # Set to true to disable IMDS probing in cloud detection (issue #986)

  # Demo server configuration
  disableAiRegistryToolsServer: false  # Set to true to disable auto-registration of the built-in airegistry-tools server

  # Deployment mode: with-gateway (nginx integration) or registry-only (catalog only)
  deploymentMode: with-gateway

  # Registry mode: full, skills-only, mcp-servers-only, agents-only
  registryMode: full

  # Tab visibility overrides (AND-ed with registryMode)
  showServersTab: true
  showVirtualServersTab: true
  showSkillsTab: true
  showAgentsTab: true

  # Application Log Configuration (centralized log rotation and retrieval)
  appLogMaxBytes: "52428800"       # Max size per log file before rotation (default 50 MB)
  appLogBackupCount: "5"           # Number of rotated backup log files to keep
  appLogCentralizedEnabled: "true"  # Write application logs to centralized store (requires MongoDB backend)
  appLogCentralizedTtlDays: "1"    # Days to retain log entries in centralized store (TTL index)
  appLogMongodbBufferSize: "50"    # Records to buffer before flushing to MongoDB
  appLogMongodbFlushIntervalSeconds: "5.0"  # Seconds between periodic flushes
  appLogLevel: "INFO"              # Application log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  appLogExcludedLoggers: "uvicorn.access,httpx,pymongo,motor"  # Comma-separated logger names to exclude from MongoDB
  # Log file path and format (issue #987). On EKS, pod stdout is scraped by
  # Splunk Connect for Kubernetes - these settings control the in-container
  # file path for code-path consistency with Docker Compose deployments.
  appLogDir: ""                    # Empty uses backend default: /var/log/containers/ai-registry
  appLogFileFormat: "json"         # "json" (default, Splunk-friendly) or "text" (legacy comma-separated)

# AWS Agent Registry Federation
awsRegistry:
  federationEnabled: false  # Enable AWS Agent Registry federation (overrides MongoDB config on startup)

# ANS (Agent Name Service) Integration
ans:
  enabled: false  # Enable ANS integration for trust verification
  apiEndpoint: "https://api.godaddy.com"  # ANS API base URL
  apiKey: ""  # GoDaddy API key (required when enabled)
  apiKeyExistingSecret: ""  # If set, read ANS_API_KEY from this K8s secret instead of apiKey
  apiKeyExistingSecretKey: "ANS_API_KEY"  # Key within the existing secret
  apiSecret: ""  # GoDaddy API secret (required when enabled)
  apiSecretExistingSecret: ""  # If set, read ANS_API_SECRET from this K8s secret instead of apiSecret
  apiSecretExistingSecretKey: "ANS_API_SECRET"  # Key within the existing secret
  apiTimeoutSeconds: "30"  # HTTP request timeout for ANS API calls
  syncIntervalHours: "6"  # Background re-verification interval
  verificationCacheTtlSeconds: "3600"  # Cache TTL for verification results

# Registry Card Configuration (for federation and discovery)
registryCard:
  url: ""  # External URL of the registry (e.g., https://registry.example.com). Defaults to computed ingress URL.
  name: "AI Registry"  # Human-readable name
  organizationName: "ACME Inc."  # Organization operating the registry
  description: ""  # Optional description
  contactEmail: ""  # Optional contact email
  contactUrl: ""  # Optional contact URL/website

# Entra ID integration (used when authProvider.type = "entra" in standalone deployment)
entra:
  clientId: ""
  clientSecret: ""
  clientSecretExistingSecret: ""  # If set, read ENTRA_CLIENT_SECRET from this K8s secret instead of clientSecret
  clientSecretExistingSecretKey: "ENTRA_CLIENT_SECRET"  # Key within the existing secret
  tenantId: ""

# IdP group filtering (applies to all identity providers)
# When set, only groups matching any of these prefixes are shown in IAM > Groups
# Example: "mcp-,registry-,ai-"
idpGroupFilterPrefix: ""

# Okta integration (used when authProvider.type = "okta" in standalone deployment)
okta:
  domain: ""  # e.g., dev-123456.okta.com
  clientId: ""
  clientSecret: ""
  clientSecretExistingSecret: ""  # If set, read OKTA_CLIENT_SECRET from this K8s secret
  clientSecretExistingSecretKey: "OKTA_CLIENT_SECRET"
  m2mClientId: ""  # Optional: defaults to clientId
  m2mClientSecret: ""  # Optional: defaults to clientSecret
  m2mClientSecretExistingSecret: ""  # If set, read OKTA_M2M_CLIENT_SECRET from this K8s secret
  m2mClientSecretExistingSecretKey: "OKTA_M2M_CLIENT_SECRET"
  apiToken: ""  # Optional: required for IAM operations
  apiTokenExistingSecret: ""  # If set, read OKTA_API_TOKEN from this K8s secret
  apiTokenExistingSecretKey: "OKTA_API_TOKEN"
  authServerId: ""  # Optional: uses default Org Authorization Server if not set

# Auth0 integration (used when authProvider.type = "auth0" in standalone deployment)
auth0:
  domain: ""  # e.g., your-tenant.us.auth0.com
  clientId: ""
  clientSecret: ""
  clientSecretExistingSecret: ""  # If set, read AUTH0_CLIENT_SECRET from this K8s secret
  clientSecretExistingSecretKey: "AUTH0_CLIENT_SECRET"
  audience: ""  # Optional: API audience for M2M tokens
  groupsClaim: "https://mcp-gateway/groups"  # Custom namespaced claim for groups
  m2mClientId: ""  # Required for IAM Management (user/role administration)
  m2mClientSecret: ""  # Required for IAM Management
  m2mClientSecretExistingSecret: ""  # If set, read AUTH0_M2M_CLIENT_SECRET from this K8s secret
  m2mClientSecretExistingSecretKey: "AUTH0_M2M_CLIENT_SECRET"
  managementApiToken: ""  # Optional: alternative to M2M credentials (expires after 24h)
  managementApiTokenExistingSecret: ""  # If set, read AUTH0_MANAGEMENT_API_TOKEN from this K8s secret
  managementApiTokenExistingSecretKey: "AUTH0_MANAGEMENT_API_TOKEN"

# Cognito integration (used when authProvider.type = "cognito" in standalone deployment)
cognito:
  userPoolId: ""  # Cognito User Pool ID
  clientId: ""
  clientSecret: ""
  domain: ""  # Optional: custom Cognito domain
  region: "us-east-1"  # AWS region for the User Pool

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Resource limits and requests
resources:
  requests:
    cpu: 1
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

# Ingress configuration
ingress:
  enabled: false
  className: alb
  hostname: ""
  annotations: {}
  tls: false
  # Routing mode: "subdomain" or "path"
  # - subdomain: mcpregistry.domain.com
  # - path: domain.com/registry (configurable via path setting)
  routingMode: subdomain
  # Path prefix when using path-based routing (default: /registry)
  path: /registry

# Extra environment variables appended to the container's `env:` list.
# Uses the native Kubernetes EnvVar schema, so `valueFrom` is supported.
#
# Validation (template render fails if violated):
#   - Names must be unique within this list.
#   - Names must not collide with chart-managed variables; use the
#     corresponding values.yaml field instead (e.g. set app.showSkillsTab
#     rather than SHOW_SKILLS_TAB here). See the reserved list in
#     templates/_helpers.tpl.
#
# User entries are appended last, so they win over chart `envFrom:`
# sources on name collision — which is why the reserved list guards
# catastrophic envFrom-sourced keys like SECRET_KEY, AUTH_PROVIDER,
# and DOCUMENTDB_PASSWORD.
#
# Example:
# extraEnv:
#   - name: MY_FEATURE_FLAG
#     value: "true"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key
extraEnv: []

# Extra `envFrom:` sources appended to the container. Use this to inject
# all keys from an external ConfigMap or Secret you manage (e.g. via
# External Secrets Operator, SealedSecrets, or Vault CSI).
#
# NOT validated at template time — Helm cannot introspect external
# ConfigMap/Secret contents. Consequences:
#   - Keys in your source will SILENTLY OVERRIDE chart-managed envFrom
#     entries (within envFrom, last source wins). Do NOT include keys
#     like SECRET_KEY, AUTH_PROVIDER, DOCUMENTDB_PASSWORD,
#     MONGODB_CONNECTION_STRING, KEYCLOAK_URL — shadowing these breaks
#     cross-service auth or data access with no error.
#   - Chart-managed `env:` entries (e.g. DEPLOYMENT_MODE, SHOW_*_TAB)
#     always win over anything in extraEnvFrom — K8s rules: explicit
#     env: beats envFrom regardless of order.
#   - Referenced resources must exist when the pod starts (the default
#     is optional: false). Set `optional: true` if the resource may be
#     absent.
#
# Example:
# extraEnvFrom:
#   - secretRef:
#       name: my-external-secrets
#   - configMapRef:
#       name: my-external-config
#       optional: true
extraEnvFrom: []

nodeSelector: {}
