{{- if and .Values.entra.clientSecret .Values.entra.clientSecretExistingSecret }}
  {{- fail "Cannot set both entra.clientSecret and entra.clientSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.okta.clientSecret .Values.okta.clientSecretExistingSecret }}
  {{- fail "Cannot set both okta.clientSecret and okta.clientSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.okta.m2mClientSecret .Values.okta.m2mClientSecretExistingSecret }}
  {{- fail "Cannot set both okta.m2mClientSecret and okta.m2mClientSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.okta.apiToken .Values.okta.apiTokenExistingSecret }}
  {{- fail "Cannot set both okta.apiToken and okta.apiTokenExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.auth0.clientSecret .Values.auth0.clientSecretExistingSecret }}
  {{- fail "Cannot set both auth0.clientSecret and auth0.clientSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.auth0.m2mClientSecret .Values.auth0.m2mClientSecretExistingSecret }}
  {{- fail "Cannot set both auth0.m2mClientSecret and auth0.m2mClientSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.auth0.managementApiToken .Values.auth0.managementApiTokenExistingSecret }}
  {{- fail "Cannot set both auth0.managementApiToken and auth0.managementApiTokenExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.ans.apiKey .Values.ans.apiKeyExistingSecret }}
  {{- fail "Cannot set both ans.apiKey and ans.apiKeyExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.ans.apiSecret .Values.ans.apiSecretExistingSecret }}
  {{- fail "Cannot set both ans.apiSecret and ans.apiSecretExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if and .Values.app.registryApiKeys .Values.app.registryApiKeysExistingSecret }}
  {{- fail "Cannot set both app.registryApiKeys and app.registryApiKeysExistingSecret, env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if not .Values.app.existingSecret }}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default "localhost" }}
{{- $protocol := ternary "https" "http" .Values.global.ingress.tls }}
{{- $registryPath := .Values.global.ingress.paths.registry | default "/registry" }}
{{- $authServerExternalUrl := "" }}
{{- $registryExternalUrl := "" }}
{{- $keycloakUrl := printf "http://%s-keycloak-headless.%s.svc.cluster.local:8080" .Release.Name .Release.Namespace}}
{{- $rootPath := "" }}
{{- $gatewayAdditionalServerNames := $domain}}
{{- /*
Topology note:

  - Browser-facing auth-server URLs (/oauth2/*) and Keycloak URLs
    (/keycloak/*, /realms/*, /resources/*) are served through the
    registry pod's in-cluster nginx reverse proxy
    (docker/nginx_rev_proxy_http_and_https.conf). auth-server and
    Keycloak have no public ingress by default.

  - In subdomain routing mode, everything is on mcpregistry.<domain>,
    so $authServerHost == $registryExternalUrl.

  - In path routing mode, the registry ingress exposes /registry AND
    siblings /oauth2, /keycloak, /realms, /resources on the same shared
    ALB host. The browser hits <domain>/oauth2/callback/..., not
    <domain>/registry/oauth2/callback/.... So auth-server redirects need
    the bare host, not the host + /registry path.
*/ -}}
{{- /*
Note on the internal KEYCLOAK_URL (pod-to-pod):

  This chart now routes browser traffic through the registry pod's
  in-cluster nginx, which has separate proxy locations for /keycloak/,
  /realms/, and /resources/. For those to work, Keycloak must serve
  from its own root — i.e. keycloak.httpRelativePath: /. This is the
  default and applies in BOTH subdomain and path routing modes.

  Previously, in path mode the chart appended `keycloakPath` to the
  internal KEYCLOAK_URL on the assumption that Keycloak itself served
  from /keycloak/. That's no longer the case — keep the bare
  ClusterIP:port for the internal URL in both modes.
*/ -}}
{{- $authServerHost := "" }}
{{- if eq $routingMode "path" }}
  {{- $registryExternalUrl = printf "%s://%s%s" $protocol $domain $registryPath }}
  {{- $authServerHost = printf "%s://%s" $protocol $domain }}
  {{- $rootPath = $registryPath }}
{{- else }}
  {{- $registryExternalUrl = printf "%s://mcpregistry.%s" $protocol $domain }}
  {{- $authServerHost = $registryExternalUrl }}
  {{- $gatewayAdditionalServerNames = printf "mcpregistry.%s" $domain }}
{{- end }}
{{- $authServerExternalUrl = $authServerHost }}
{{- /* Auto-generate federation tokens if not provided */ -}}
{{- /* Resolve federation values - prefer global, fallback to local app values */ -}}
{{- $federationEnabled := .Values.app.federationStaticTokenAuthEnabled | default false }}
{{- if .Values.global.federation }}
  {{- $federationEnabled = .Values.global.federation.staticTokenAuthEnabled | default $federationEnabled }}
{{- end }}
{{- $federationStaticTokenRaw := .Values.app.federationStaticToken }}
{{- $federationEncryptionKeyRaw := .Values.app.federationEncryptionKey }}
{{- $registryId := .Values.app.registryId }}
{{- if .Values.global.federation }}
  {{- $federationStaticTokenRaw = .Values.global.federation.staticToken | default $federationStaticTokenRaw }}
  {{- $federationEncryptionKeyRaw = .Values.global.federation.encryptionKey | default $federationEncryptionKeyRaw }}
  {{- $registryId = .Values.global.federation.registryId | default $registryId }}
{{- end }}
{{- /* Generate URL-safe token (equivalent to secrets.token_urlsafe(32)) */ -}}
{{- $federationStaticToken := $federationStaticTokenRaw | default (randBytes 32 | replace "+" "-" | replace "/" "_" | trimSuffix "=") }}
{{- /* Generate Fernet-compatible key (32 random bytes, base64-encoded) */ -}}
{{- $federationEncryptionKey := $federationEncryptionKeyRaw | default (randBytes 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.envSecretName }}
  namespace: {{ .Release.Namespace | quote }}
data:
  AUTH_SERVER_EXTERNAL_URL: {{ $authServerExternalUrl | b64enc | quote }}
  AUTH_SERVER_URL: {{ printf "http://auth-server.%s.svc.cluster.local:8888" .Release.Namespace | b64enc | quote }}
  {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
  KEYCLOAK_ADMIN: {{ (.Values.global.authProvider.keycloak.adminUsername | default "user") | b64enc | quote }}
  {{- end }}
  GATEWAY_ADDITIONAL_SERVER_NAMES: {{ $gatewayAdditionalServerNames| b64enc | quote }}
{{- if not .Values.global.oauthProviderSecretName }}
  {{/* OAuth provider vars managed per-chart in standalone deployment */}}
  AUTH_PROVIDER: {{ (.Values.global.authProvider.type | default "keycloak") | b64enc | quote }}
  {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
  KEYCLOAK_ENABLED: {{ "true" | b64enc | quote }}
  KEYCLOAK_URL: {{ $keycloakUrl | b64enc | quote }}
  KEYCLOAK_REALM: {{ (.Values.global.authProvider.keycloak.realm | default "mcp-gateway") | b64enc | quote }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "entra" }}
  ENTRA_ENABLED: {{ "true" | b64enc | quote }}
  ENTRA_CLIENT_ID: {{ .Values.entra.clientId | b64enc | quote }}
  {{- if not .Values.entra.clientSecretExistingSecret }}
  ENTRA_CLIENT_SECRET: {{ .Values.entra.clientSecret | b64enc | quote }}
  {{- end }}
  ENTRA_TENANT_ID: {{ .Values.entra.tenantId | b64enc | quote }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "okta" }}
  OKTA_ENABLED: {{ "true" | b64enc | quote }}
  OKTA_DOMAIN: {{ .Values.okta.domain | b64enc | quote }}
  OKTA_CLIENT_ID: {{ .Values.okta.clientId | b64enc | quote }}
  {{- if not .Values.okta.clientSecretExistingSecret }}
  OKTA_CLIENT_SECRET: {{ .Values.okta.clientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.okta.m2mClientId }}
  OKTA_M2M_CLIENT_ID: {{ .Values.okta.m2mClientId | b64enc | quote }}
  {{- end }}
  {{- if and .Values.okta.m2mClientSecret (not .Values.okta.m2mClientSecretExistingSecret) }}
  OKTA_M2M_CLIENT_SECRET: {{ .Values.okta.m2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if and .Values.okta.apiToken (not .Values.okta.apiTokenExistingSecret) }}
  OKTA_API_TOKEN: {{ .Values.okta.apiToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.okta.authServerId }}
  OKTA_AUTH_SERVER_ID: {{ .Values.okta.authServerId | b64enc | quote }}
  {{- end }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "auth0" }}
  AUTH0_ENABLED: {{ "true" | b64enc | quote }}
  AUTH0_DOMAIN: {{ .Values.auth0.domain | b64enc | quote }}
  AUTH0_CLIENT_ID: {{ .Values.auth0.clientId | b64enc | quote }}
  {{- if not .Values.auth0.clientSecretExistingSecret }}
  AUTH0_CLIENT_SECRET: {{ .Values.auth0.clientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth0.audience }}
  AUTH0_AUDIENCE: {{ .Values.auth0.audience | b64enc | quote }}
  {{- end }}
  AUTH0_GROUPS_CLAIM: {{ .Values.auth0.groupsClaim | b64enc | quote }}
  {{- if .Values.auth0.m2mClientId }}
  AUTH0_M2M_CLIENT_ID: {{ .Values.auth0.m2mClientId | b64enc | quote }}
  {{- end }}
  {{- if and .Values.auth0.m2mClientSecret (not .Values.auth0.m2mClientSecretExistingSecret) }}
  AUTH0_M2M_CLIENT_SECRET: {{ .Values.auth0.m2mClientSecret | b64enc | quote }}
  {{- end }}
  {{- if and .Values.auth0.managementApiToken (not .Values.auth0.managementApiTokenExistingSecret) }}
  AUTH0_MANAGEMENT_API_TOKEN: {{ .Values.auth0.managementApiToken | b64enc | quote }}
  {{- end }}
  {{- else if eq (.Values.global.authProvider.type | default "keycloak") "cognito" }}
  COGNITO_ENABLED: {{ "true" | b64enc | quote }}
  COGNITO_USER_POOL_ID: {{ required "cognito.userPoolId is required" .Values.cognito.userPoolId | b64enc | quote }}
  COGNITO_CLIENT_ID: {{ required "cognito.clientId is required" .Values.cognito.clientId | b64enc | quote }}
  COGNITO_CLIENT_SECRET: {{ required "cognito.clientSecret is required" .Values.cognito.clientSecret | b64enc | quote }}
  {{- if .Values.cognito.domain }}
  COGNITO_DOMAIN: {{ .Values.cognito.domain | b64enc | quote }}
  {{- end }}
  {{- if .Values.cognito.region }}
  AWS_REGION: {{ .Values.cognito.region | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
  ROOT_PATH: {{ $rootPath | b64enc | quote }}
  SESSION_COOKIE_DOMAIN: {{ (.Values.app.sessionCookieDomain | default (printf ".%s" $domain)) | b64enc | quote }}
  SESSION_COOKIE_SECURE: {{ (.Values.global.ingress.tls | toString) | b64enc | quote }}
  {{- if .Values.idpGroupFilterPrefix }}
  IDP_GROUP_FILTER_PREFIX: {{ .Values.idpGroupFilterPrefix | b64enc | quote }}
  {{- end }}
  SKILL_SECURITY_SCAN_ENABLED: {{ .Values.app.skillSecurityScanEnabled | toString | b64enc | quote }}
  SKILL_SECURITY_ANALYZERS: {{ .Values.app.skillSecurityAnalyzers | b64enc | quote }}
  # Static API keys for registry path authentication (JSON string)
  {{- if and .Values.app.registryApiKeys (not .Values.app.registryApiKeysExistingSecret) }}
  REGISTRY_API_KEYS: {{ .Values.app.registryApiKeys | b64enc | quote }}
  {{- end }}
  # Registration webhook (issue #742)
  {{- if .Values.app.registrationWebhookUrl }}
  REGISTRATION_WEBHOOK_URL: {{ .Values.app.registrationWebhookUrl | b64enc | quote }}
  {{- end }}
  REGISTRATION_WEBHOOK_AUTH_HEADER: {{ .Values.app.registrationWebhookAuthHeader | b64enc | quote }}
  {{- if .Values.app.registrationWebhookAuthToken }}
  REGISTRATION_WEBHOOK_AUTH_TOKEN: {{ .Values.app.registrationWebhookAuthToken | b64enc | quote }}
  {{- end }}
  REGISTRATION_WEBHOOK_TIMEOUT_SECONDS: {{ .Values.app.registrationWebhookTimeoutSeconds | toString | b64enc | quote }}
  # Registration gate / admission control (issue #809)
  REGISTRATION_GATE_ENABLED: {{ .Values.app.registrationGateEnabled | toString | b64enc | quote }}
  {{- if .Values.app.registrationGateUrl }}
  REGISTRATION_GATE_URL: {{ .Values.app.registrationGateUrl | b64enc | quote }}
  {{- end }}
  REGISTRATION_GATE_AUTH_TYPE: {{ .Values.app.registrationGateAuthType | b64enc | quote }}
  {{- if .Values.app.registrationGateAuthCredential }}
  REGISTRATION_GATE_AUTH_CREDENTIAL: {{ .Values.app.registrationGateAuthCredential | b64enc | quote }}
  {{- end }}
  REGISTRATION_GATE_AUTH_HEADER_NAME: {{ .Values.app.registrationGateAuthHeaderName | b64enc | quote }}
  REGISTRATION_GATE_TIMEOUT_SECONDS: {{ .Values.app.registrationGateTimeoutSeconds | toString | b64enc | quote }}
  REGISTRATION_GATE_MAX_RETRIES: {{ .Values.app.registrationGateMaxRetries | toString | b64enc | quote }}
  {{- if .Values.app.registrationGateOauth2TokenUrl }}
  REGISTRATION_GATE_OAUTH2_TOKEN_URL: {{ .Values.app.registrationGateOauth2TokenUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.registrationGateOauth2ClientId }}
  REGISTRATION_GATE_OAUTH2_CLIENT_ID: {{ .Values.app.registrationGateOauth2ClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.registrationGateOauth2ClientSecret }}
  REGISTRATION_GATE_OAUTH2_CLIENT_SECRET: {{ .Values.app.registrationGateOauth2ClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.registrationGateOauth2Scope }}
  REGISTRATION_GATE_OAUTH2_SCOPE: {{ .Values.app.registrationGateOauth2Scope | b64enc | quote }}
  {{- end }}
  # M2M direct client registration (issue #851)
  M2M_DIRECT_REGISTRATION_ENABLED: {{ .Values.app.m2mDirectRegistrationEnabled | toString | b64enc | quote }}
  # ANS (Agent Name Service) Integration
  {{- if .Values.ans.enabled }}
  ANS_INTEGRATION_ENABLED: {{ "true" | b64enc | quote }}
  ANS_API_ENDPOINT: {{ .Values.ans.apiEndpoint | b64enc | quote }}
  {{- if and .Values.ans.apiKey (not .Values.ans.apiKeyExistingSecret) }}
  ANS_API_KEY: {{ .Values.ans.apiKey | b64enc | quote }}
  {{- end }}
  {{- if and .Values.ans.apiSecret (not .Values.ans.apiSecretExistingSecret) }}
  ANS_API_SECRET: {{ .Values.ans.apiSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.apiTimeoutSeconds }}
  ANS_API_TIMEOUT_SECONDS: {{ .Values.ans.apiTimeoutSeconds | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.syncIntervalHours }}
  ANS_SYNC_INTERVAL_HOURS: {{ .Values.ans.syncIntervalHours | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.ans.verificationCacheTtlSeconds }}
  ANS_VERIFICATION_CACHE_TTL_SECONDS: {{ .Values.ans.verificationCacheTtlSeconds | toString | b64enc | quote }}
  {{- end }}
  {{- end }}
  # Registry Card Configuration
  REGISTRY_URL: {{ (.Values.registryCard.url | default $registryExternalUrl) | b64enc | quote }}
  REGISTRY_NAME: {{ (.Values.registryCard.name | default "AI Registry") | b64enc | quote }}
  REGISTRY_ORGANIZATION_NAME: {{ (.Values.registryCard.organizationName | default "ACME Inc.") | b64enc | quote }}
  REGISTRY_DESCRIPTION: {{ (.Values.registryCard.description | default "") | b64enc | quote }}
  REGISTRY_CONTACT_EMAIL: {{ (.Values.registryCard.contactEmail | default "") | b64enc | quote }}
  REGISTRY_CONTACT_URL: {{ (.Values.registryCard.contactUrl | default "") | b64enc | quote }}
{{- if not .Values.global.sharedSecretName }}
  {{/* Federation and SECRET_KEY managed per-chart in standalone deployment */}}
  {{- if $federationEnabled }}
  FEDERATION_STATIC_TOKEN_AUTH_ENABLED: {{ $federationEnabled | toString | b64enc | quote }}
  FEDERATION_STATIC_TOKEN: {{ $federationStaticToken | b64enc | quote }}
  FEDERATION_ENCRYPTION_KEY: {{ $federationEncryptionKey | b64enc | quote }}
  {{- if .Values.app.federationTokenEndpoint }}
  FEDERATION_TOKEN_ENDPOINT: {{ .Values.app.federationTokenEndpoint | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.federationClientId }}
  FEDERATION_CLIENT_ID: {{ .Values.app.federationClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.federationClientSecret }}
  FEDERATION_CLIENT_SECRET: {{ .Values.app.federationClientSecret | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if $registryId }}
  REGISTRY_ID: {{ $registryId | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.asorAccessToken }}
  ASOR_ACCESS_TOKEN: {{ .Values.app.asorAccessToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.workdayTokenUrl }}
  WORKDAY_TOKEN_URL: {{ .Values.app.workdayTokenUrl | b64enc | quote }}
  {{- end }}
  {{/* SECRET_KEY required for standalone deployment - must match auth-server's key */}}
  SECRET_KEY: {{ required "app.secretKey or global.secretKey is required for standalone deployment" (.Values.global.secretKey | default .Values.app.secretKey) | b64enc | quote }}
{{- end }}
{{- end }}
