apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-app-log-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
data:
  APP_LOG_MAX_BYTES: {{ .Values.app.appLogMaxBytes | default "52428800" | quote }}
  APP_LOG_BACKUP_COUNT: {{ .Values.app.appLogBackupCount | default "5" | quote }}
  APP_LOG_CENTRALIZED_ENABLED: {{ .Values.app.appLogCentralizedEnabled | default "true" | quote }}
  APP_LOG_CENTRALIZED_TTL_DAYS: {{ .Values.app.appLogCentralizedTtlDays | default "1" | quote }}
  APP_LOG_MONGODB_BUFFER_SIZE: {{ .Values.app.appLogMongodbBufferSize | default "50" | quote }}
  APP_LOG_MONGODB_FLUSH_INTERVAL_SECONDS: {{ .Values.app.appLogMongodbFlushIntervalSeconds | default "5.0" | quote }}
  APP_LOG_LEVEL: {{ .Values.app.appLogLevel | default "INFO" | quote }}
  APP_LOG_EXCLUDED_LOGGERS: {{ .Values.app.appLogExcludedLoggers | default "uvicorn.access,httpx,pymongo,motor" | quote }}
  # Issue #987: log file path + format. Empty APP_LOG_DIR lets the backend use its default.
  APP_LOG_DIR: {{ .Values.app.appLogDir | default "" | quote }}
  APP_LOG_FILE_FORMAT: {{ .Values.app.appLogFileFormat | default "json" | quote }}
