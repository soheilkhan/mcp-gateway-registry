{{- if .Values.ingress.enabled }}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default .Values.ingress.hostname }}
{{- $globalPaths := .Values.global.ingress.paths | default dict }}
{{- $pathPrefix := (get $globalPaths "registry") | default .Values.ingress.path | default "/registry" }}
{{- /*
In path routing mode the registry pod's in-cluster nginx reverse proxy
fronts auth-server and Keycloak for browser traffic (see
docker/nginx_rev_proxy_http_and_https.conf). The auth-server and
Keycloak ingresses are disabled by default, so the ALB must forward
their browser-facing paths to the registry Service — nginx handles the
final hop to the auth-server / Keycloak ClusterIP Services.

Subdomain mode does not need these extra rules: `/` on
mcpregistry.<domain> already catches every browser-facing path and
nginx does the internal routing.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    {{- if eq $routingMode "path" }}
    alb.ingress.kubernetes.io/group.name: mcp-gateway-stack
    alb.ingress.kubernetes.io/group.order: '20'
    {{- end }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/success-codes: 200,302
    {{- if .Values.global.ingress.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.global.ingress.inboundCidrs }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- if eq $routingMode "path" }}
    - host: {{ $domain | quote }}
      http:
        paths:
          - path: {{ $pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /keycloak
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
    {{- else }}
    - host: {{ printf "mcpregistry.%s" $domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
    {{- end }}
{{- end }}
