apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-otel-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
data:
  {{- if .Values.app.otelOtlpEndpoint }}
  OTEL_OTLP_ENDPOINT: {{ .Values.app.otelOtlpEndpoint | quote }}
  {{- end }}
  {{- if .Values.app.otelExporterOtlpHeaders }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.app.otelExporterOtlpHeaders | quote }}
  {{- end }}
  {{- if .Values.app.otelOtlpExportIntervalMs }}
  OTEL_OTLP_EXPORT_INTERVAL_MS: {{ .Values.app.otelOtlpExportIntervalMs | quote }}
  {{- end }}
  {{- if .Values.app.otelExporterOtlpMetricsTemporalityPreference }}
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: {{ .Values.app.otelExporterOtlpMetricsTemporalityPreference | quote }}
  {{- end }}
  {{- if .Values.app.mcpTelemetryDisabled }}
  MCP_TELEMETRY_DISABLED: {{ .Values.app.mcpTelemetryDisabled | quote }}
  {{- end }}
  {{- if .Values.app.mcpTelemetryOptOut }}
  MCP_TELEMETRY_OPT_OUT: {{ .Values.app.mcpTelemetryOptOut | quote }}
  {{- end }}
  {{- if .Values.app.telemetryHeartbeatIntervalMinutes }}
  MCP_TELEMETRY_HEARTBEAT_INTERVAL_MINUTES: {{ .Values.app.telemetryHeartbeatIntervalMinutes | quote }}
  {{- end }}
  {{- if .Values.app.telemetryDebug }}
  MCP_TELEMETRY_DEBUG: {{ .Values.app.telemetryDebug | quote }}
  {{- end }}
  {{- if .Values.app.mcpTelemetryImdsProbeDisabled }}
  MCP_TELEMETRY_IMDS_PROBE_DISABLED: {{ .Values.app.mcpTelemetryImdsProbeDisabled | quote }}
  {{- end }}
  {{- if .Values.app.disableAiRegistryToolsServer }}
  DISABLE_AI_REGISTRY_TOOLS_SERVER: {{ .Values.app.disableAiRegistryToolsServer | quote }}
  {{- end }}

