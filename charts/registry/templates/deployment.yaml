apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
      app.kubernetes.io/component: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/component: {{ .Values.app.name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
            - containerPort: 7860
              name: registry
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: registry-otel-config
            - secretRef:
                name: {{ .Values.app.existingSecret | default .Values.app.envSecretName }}
            {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
            - secretRef:
                name: keycloak-client-secret
            {{- end }}
            - secretRef:
                name: {{ .Values.global.existingMongoCredentialsSecret | default "mongo-credentials" }}
            {{- if .Values.global.sharedSecretName }}
            - secretRef:
                name: {{ .Values.global.existingSharedSecret | default .Values.global.sharedSecretName }}
            {{- end }}
            {{- if .Values.global.oauthProviderSecretName }}
            - secretRef:
                name: {{ .Values.global.existingOauthProviderSecret | default .Values.global.oauthProviderSecretName }}
            {{- end }}
          env:
            - name: DEPLOYMENT_MODE
              value: {{ .Values.app.deploymentMode | default "with-gateway" | quote }}
            - name: REGISTRY_MODE
              value: {{ .Values.app.registryMode | default "full" | quote }}
            - name: SHOW_SERVERS_TAB
              value: {{ .Values.app.showServersTab | default true | quote }}
            - name: SHOW_VIRTUAL_SERVERS_TAB
              value: {{ .Values.app.showVirtualServersTab | default true | quote }}
            - name: SHOW_SKILLS_TAB
              value: {{ .Values.app.showSkillsTab | default true | quote }}
            - name: SHOW_AGENTS_TAB
              value: {{ .Values.app.showAgentsTab | default true | quote }}
            {{- if .Values.awsRegistry.federationEnabled }}
            - name: AWS_REGISTRY_FEDERATION_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak
                  key: admin-password
            {{- end }}
            {{- if .Values.entra.clientSecretExistingSecret }}
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.entra.clientSecretExistingSecret }}
                  key: {{ .Values.entra.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.clientSecretExistingSecret }}
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.clientSecretExistingSecret }}
                  key: {{ .Values.okta.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.m2mClientSecretExistingSecret }}
            - name: OKTA_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.m2mClientSecretExistingSecret }}
                  key: {{ .Values.okta.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.apiTokenExistingSecret }}
            - name: OKTA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.apiTokenExistingSecret }}
                  key: {{ .Values.okta.apiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.clientSecretExistingSecret }}
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.clientSecretExistingSecret }}
                  key: {{ .Values.auth0.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.m2mClientSecretExistingSecret }}
            - name: AUTH0_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.m2mClientSecretExistingSecret }}
                  key: {{ .Values.auth0.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.managementApiTokenExistingSecret }}
            - name: AUTH0_MANAGEMENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.managementApiTokenExistingSecret }}
                  key: {{ .Values.auth0.managementApiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.ans.apiKeyExistingSecret }}
            - name: ANS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ans.apiKeyExistingSecret }}
                  key: {{ .Values.ans.apiKeyExistingSecretKey }}
            {{- end }}
            {{- if .Values.ans.apiSecretExistingSecret }}
            - name: ANS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ans.apiSecretExistingSecret }}
                  key: {{ .Values.ans.apiSecretExistingSecretKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
