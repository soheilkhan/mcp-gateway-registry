apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
      app.kubernetes.io/component: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/component: {{ .Values.app.name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.app.port }}
              name: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ .Values.app.existingSecret | default .Values.app.envSecretName }}
            {{- if .Values.global.sharedSecretName }}
            - secretRef:
                name: {{ .Values.global.existingSharedSecret | default .Values.global.sharedSecretName }}
            {{- end }}
          env:
            - name: HOST
              value: {{ .Values.app.bindHost | quote }}
            {{- if .Values.app.embeddingsApiKeyExistingSecret }}
            - name: EMBEDDINGS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.embeddingsApiKeyExistingSecret }}
                  key: {{ .Values.app.embeddingsApiKeyExistingSecretKey }}
            {{- end }}
            {{- /* GitHub private repo auth (SKILL.md fetching) */}}
            {{- if .Values.app.githubAppId }}
            - name: GITHUB_APP_ID
              value: {{ .Values.app.githubAppId | quote }}
            {{- end }}
            {{- if .Values.app.githubAppInstallationId }}
            - name: GITHUB_APP_INSTALLATION_ID
              value: {{ .Values.app.githubAppInstallationId | quote }}
            {{- end }}
            {{- if .Values.app.githubExtraHosts }}
            - name: GITHUB_EXTRA_HOSTS
              value: {{ .Values.app.githubExtraHosts | quote }}
            {{- end }}
            {{- if ne .Values.app.githubApiBaseUrl "https://api.github.com" }}
            - name: GITHUB_API_BASE_URL
              value: {{ .Values.app.githubApiBaseUrl | quote }}
            {{- end }}
            {{- if .Values.app.githubPatExistingSecret }}
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.githubPatExistingSecret }}
                  key: {{ .Values.app.githubPatExistingSecretKey }}
            {{- else if .Values.app.githubPat }}
            - name: GITHUB_PAT
              value: {{ .Values.app.githubPat | quote }}
            {{- end }}
            {{- if .Values.app.githubAppPrivateKeyExistingSecret }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.githubAppPrivateKeyExistingSecret }}
                  key: {{ .Values.app.githubAppPrivateKeyExistingSecretKey }}
            {{- else if .Values.app.githubAppPrivateKey }}
            - name: GITHUB_APP_PRIVATE_KEY
              value: {{ .Values.app.githubAppPrivateKey | quote }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
