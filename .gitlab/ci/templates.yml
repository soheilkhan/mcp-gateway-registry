# --- Shared variables ---

variables:
  REGISTRY_IMAGE_PREFIX: "zeta-aiml/gen-ai/ai-assistants/images"

# --- Reusable templates ---

.python_uv_template:
  image: python:3.12
  before_script:
    - python --version
    - pip install --no-cache-dir uv
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/uv

.build-docker-image: &build-docker-image
  image: docker:27.2
  variables: &build-docker-image-variables
    REGION: us-east-1
    PROD_REGION: us-east-1
  before_script:
    - apk add --no-cache --update build-base curl py3-setuptools python3 py-pip gettext aws-cli
    - aws sts get-caller-identity
    - docker login -u AWS -p $(aws ecr get-login-password --region $REGION) ${AWS_PREPROD_ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com
    - docker login -u AWS -p $(aws ecr get-login-password --region $REGION) ${AWS_PROD_ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com
    - set -x
  cache:
    key: setup
    paths:
      - .cache/pip
    policy: pull

.trivy_scan_template:
  image: docker:27.2
  variables:
    TRIVY_SEVERITY: "CRITICAL,HIGH"
    TRIVY_EXIT_CODE: "1"
    TRIVY_IGNORE_UNFIXED: "true"
  before_script:
    - apk add --no-cache --update curl aws-cli bash
    - aws sts get-caller-identity
    - docker login -u AWS -p $(aws ecr get-login-password --region $REGION) ${AWS_PREPROD_ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

# --- Rule sets ---

.run_registry_tests_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - registry/**/*
        - tests/**/*
        - pyproject.toml
        - scripts/test.py
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never

.run_auth_server_tests_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - auth_server/**/*
        - tests/auth_server/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop)$/'
      changes:
        - auth_server/**/*
        - tests/auth_server/**/*
        - .gitlab-ci.yml
