name: Move Release Tag After Helm Chart Update

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  retag-release:
    name: Move Release Tag to Main
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'helm-update-') &&
      github.repository == 'agentic-community/mcp-gateway-registry'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version and move tag
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#helm-update-}"

          # Pre-1.23.0 releases used a `v` prefix (e.g. v1.0.22). From 1.23.0
          # onward tags are bare semver (1.23.0, 1.24.0, ...). Probe both
          # forms and move whichever one actually exists.
          V_TAG="v${VERSION}"
          BARE_TAG="${VERSION}"

          if git rev-parse --verify "refs/tags/${BARE_TAG}" >/dev/null 2>&1; then
            TAG="${BARE_TAG}"
          elif git rev-parse --verify "refs/tags/${V_TAG}" >/dev/null 2>&1; then
            TAG="${V_TAG}"
          else
            echo "No tag found for version ${VERSION} (tried ${BARE_TAG} and ${V_TAG})"
            exit 1
          fi

          echo "Moving tag $TAG to current main HEAD"

          git tag -f "$TAG"
          git push origin "$TAG" --force
