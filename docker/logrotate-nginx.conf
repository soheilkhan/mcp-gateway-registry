/var/log/containers/ai-registry/nginx-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appuser appuser
    postrotate
        # pid file path is set by registry-entrypoint.sh via sed on nginx.conf
        [ ! -f /run/nginx/nginx.pid ] || kill -USR1 `cat /run/nginx/nginx.pid`
    endscript
}
